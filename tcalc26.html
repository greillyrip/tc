<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK PAYE Cumulative Tax Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            padding: 2rem;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { margin-top: 0; font-size: 1.5rem; color: #111827; }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #1d4ed8; }
        .result-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f8fafc;
            border-left: 4px solid #2563eb;
            border-radius: 4px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .total-row {
            font-weight: bold;
            font-size: 1.2rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 0.5rem;
            margin-top: 0.5rem;
            color: #111827;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>UK PAYE Cumulative Tax Calculator (2026/27)</h1>
    
    <div class="form-group">
        <label for="payToDate">Taxable Pay to Date (£)</label>
        <input type="number" id="payToDate" step="0.01" placeholder="e.g. 6220">
    </div>

    <div class="form-group">
        <label for="taxCode">Tax Code</label>
        <input type="text" id="taxCode" placeholder="e.g. 1131L" style="text-transform: uppercase;">
    </div>

    <div class="form-group">
        <label for="payDate">Pay Date</label>
        <input type="date" id="payDate">
    </div>

    <button onclick="calculateTax()">Calculate Tax Due to Date</button>

    <div id="result" class="result-box" style="display: none;">
        <div class="result-row"><span>Tax Year Month:</span> <span id="resMonth">-</span></div>
        <div class="result-row"><span>Pro-rated Allowance:</span> <span id="resAllowance">-</span></div>
        <div class="result-row"><span>Taxable Income (HMRC Rounded):</span> <span id="resTaxable">-</span></div>
        <div class="total-row result-row"><span>Tax Due to Date:</span> <span id="resTax">-</span></div>
    </div>
</div>

<script>
    // 1. Parse URL Parameters on load
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        
        if (params.has('payToDate')) document.getElementById('payToDate').value = params.get('payToDate');
        if (params.has('taxCode')) document.getElementById('taxCode').value = params.get('taxCode').toUpperCase();
        if (params.has('payDate')) document.getElementById('payDate').value = params.get('payDate');
        
        // Auto-calculate if all params are provided via URL
        if (params.has('payToDate') && params.has('taxCode') && params.has('payDate')) {
            calculateTax();
        }
    });

    // 2. Determine PAYE Tax Month based on Date (Tax year starts April 6th)
    function getTaxMonth(dateString) {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return null;

        const year = date.getFullYear();
        // April 6th of the current paying year
        let taxYearStart = new Date(year, 3, 6); // Month is 0-indexed, 3 = April
        
        // If the date is before April 6th, it belongs to the previous tax year's calendar cycle
        if (date < taxYearStart) {
            taxYearStart = new Date(year - 1, 3, 6);
        }

        // Calculate whole months elapsed since April 6th
        let months = (date.getFullYear() - taxYearStart.getFullYear()) * 12 + (date.getMonth() - taxYearStart.getMonth());
        
        // Adjust if day of month is earlier than the 6th
        if (date.getDate() < taxYearStart.getDate()) {
            months--;
        }

        // Tax month is 1-indexed (Month 1 = Apr 6 - May 5)
        const taxMonth = months + 1;
        return (taxMonth >= 1 && taxMonth <= 12) ? taxMonth : null;
    }

    // 3. Main Tax Calculation logic
    function calculateTax() {
        const payToDate = parseFloat(document.getElementById('payToDate').value);
        const taxCodeStr = document.getElementById('taxCode').value.trim().toUpperCase();
        const payDateStr = document.getElementById('payDate').value;

        if (isNaN(payToDate) || !taxCodeStr || !payDateStr) {
            alert("Please fill in all fields correctly.");
            return;
        }

        const taxMonth = getTaxMonth(payDateStr);
        if (!taxMonth) {
            alert("Invalid date or outside standard processing boundaries.");
            return;
        }

        // Extract annual personal allowance from standard 'L' code
        const codeMatch = taxCodeStr.match(/^(\d+)[L]$/);
        if (!codeMatch) {
            alert("This basic tool currently only supports standard cumulative 'L' tax codes (e.g., 1131L).");
            return;
        }
        const annualAllowance = parseFloat(codeMatch[1]) * 10;

        // Pro-rate personal allowance for current cumulative month
        const cumulativeAllowance = (annualAllowance / 12) * taxMonth;

        // Cumulative taxable income before rounding
        let rawTaxableIncome = payToDate - cumulativeAllowance;
        if (rawTaxableIncome < 0) rawTaxableIncome = 0;

        // HMRC Rounding Rule: Drop the pence entirely on taxable income before tax band lookup
        const hmrcRoundedTaxableIncome = Math.floor(rawTaxableIncome);

        // Basic Rate Band 2026/27 pro-rated check (Basic rate limit £37,700)
        const basicRateLimitYTD = (37700 / 12) * taxMonth;
        let taxDueYTD = 0;

        if (hmrcRoundedTaxableIncome <= basicRateLimitYTD) {
            taxDueYTD = hmrcRoundedTaxableIncome * 0.20;
        } else {
            // Basic rate portion
            taxDueYTD = basicRateLimitYTD * 0.20;
            // Higher rate portion (40%) up to current YTD scope
            const higherRateTaxable = hmrcRoundedTaxableIncome - basicRateLimitYTD;
            taxDueYTD += (higherRateTaxable * 0.40); 
        }

        // Final HMRC Rounding down on tax due to the nearest whole pound
        const finalTaxDue = Math.floor(taxDueYTD);

        // Display results
        document.getElementById('resMonth').textContent = `Month ${taxMonth}`;
        document.getElementById('resAllowance').textContent = `£${cumulativeAllowance.toFixed(2)}`;
        document.getElementById('resTaxable').textContent = `£${hmrcRoundedTaxableIncome.toFixed(2)}`;
        document.getElementById('resTax').textContent = `£${finalTaxDue.toFixed(2)}`;
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
