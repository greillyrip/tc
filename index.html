<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK PAYE Tax Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            padding: 2rem;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { margin-top: 0; font-size: 1.5rem; color: #111827; }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 1.25rem;
            user-select: none;
        }
        .checkbox-group input {
            width: auto;
            margin-right: 0.5rem;
            transform: scale(1.2);
            cursor: pointer;
        }
        .checkbox-group label {
            display: inline;
            margin-bottom: 0;
            cursor: pointer;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #1d4ed8; }
        .result-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f8fafc;
            border-left: 4px solid #2563eb;
            border-radius: 4px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .total-row {
            font-weight: bold;
            font-size: 1.2rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 0.5rem;
            margin-top: 0.5rem;
            color: #111827;
        }
        .alert-text {
            color: #b91c1c;
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .info-badge {
            background-color: #e0f2fe;
            color: #0369a1;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>UK PAYE Tax Calculator (2026/27)</h1>
    
    <div class="form-group">
        <label for="payToDate">Pay for Period / To Date (£)</label>
        <input type="number" id="payToDate" step="0.01" placeholder="e.g. 6220">
    </div>

    <div class="form-group">
        <label for="taxCode">Tax Code</label>
        <input type="text" id="taxCode" placeholder="e.g. 1131L, K400, 1257T" style="text-transform: uppercase;">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="w1m1">
        <label for="w1m1">This is a <strong>W1 / M1</strong> non-cumulative code</label>
    </div>

    <div class="form-group">
        <label for="payDate">Pay Date</label>
        <input type="date" id="payDate">
    </div>

    <button onclick="calculateTax()">Calculate Income Tax</button>

    <div id="result" class="result-box" style="display: none;">
        <div class="result-row"><span>Calculation Basis:</span> <span id="resBasis" class="info-badge">Cumulative</span></div>
        <div class="result-row"><span>Tax Year Month:</span> <span id="resMonth">-</span></div>
        <div class="result-row"><span id="lblAdjustment">Pro-rated Allowance:</span> <span id="resAllowance">-</span></div>
        <div class="result-row"><span>Taxable Income (HMRC Rounded):</span> <span id="resTaxable">-</span></div>
        <div class="total-row result-row"><span id="lblTaxTotal">Tax Due to Date:</span> <span id="resTax">-</span></div>
        <div id="capAlert" class="alert-text" style="display: none;">* Regulatory Warning: Tax due was capped at 50% of the period's taxable pay.</div>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        
        if (params.has('payToDate')) document.getElementById('payToDate').value = params.get('payToDate');
        if (params.has('taxCode')) document.getElementById('taxCode').value = params.get('taxCode').toUpperCase();
        if (params.has('payDate')) document.getElementById('payDate').value = params.get('payDate');
        
        // Handle incoming checkbox state from URL if provided (e.g., &w1m1=true or &w1m1=1)
        if (params.has('w1m1')) {
            const w1m1Val = params.get('w1m1').toLowerCase();
            document.getElementById('w1m1').checked = (w1m1Val === 'true' || w1m1Val === '1');
        }
        
        if (params.has('payToDate') && params.has('taxCode') && params.has('payDate')) {
            setTimeout(calculateTax, 50);
        }
    });

    function getTaxMonth(dateString) {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return null;
        const year = date.getFullYear();
        let taxYearStart = new Date(year, 3, 6); // April 6
        if (date < taxYearStart) taxYearStart = new Date(year - 1, 3, 6);

        let months = (date.getFullYear() - taxYearStart.getFullYear()) * 12 + (date.getMonth() - taxYearStart.getMonth());
        if (date.getDate() < taxYearStart.getDate()) months--;

        const taxMonth = months + 1;
        return (taxMonth >= 1 && taxMonth <= 12) ? taxMonth : null;
    }

    function calculateTax() {
        const payToDate = parseFloat(document.getElementById('payToDate').value);
        const taxCodeStr = document.getElementById('taxCode').value.trim().toUpperCase().replace(/\s+/g, '');
        const payDateStr = document.getElementById('payDate').value;
        const isNonCumulative = document.getElementById('w1m1').checked;

        if (isNaN(payToDate) || !taxCodeStr || !payDateStr) {
            alert("Please fill in all fields correctly.");
            return;
        }

        const trueTaxMonth = getTaxMonth(payDateStr);
        if (!trueTaxMonth) {
            alert("Invalid date selection.");
            return;
        }

        // Calculation rules enforce Month 1 metrics if checkbox state is active
        const calculationMonth = isNonCumulative ? 1 : trueTaxMonth;

        let isKCode = false;
        let annualValue = 0;

        if (taxCodeStr.startsWith('K')) {
            const kMatch = taxCodeStr.match(/^K(\d+)$/);
            if (!kMatch) {
                alert("Invalid K code structure. Use format like K400.");
                return;
            }
            isKCode = true;
            annualValue = parseFloat(kMatch[1]) * 10;
        } else {
            const standardMatch = taxCodeStr.match(/^(\d+)[LTM]$/);
            if (!standardMatch) {
                alert("Unsupported tax code format. Use standard suffixes (L, T, M) or a K prefix.");
                return;
            }
            annualValue = parseFloat(standardMatch[1]) * 10;
        }

        const proRatedAdjustment = (annualValue / 12) * calculationMonth;
        let rawTaxableIncome = 0;

        const lblAdjustment = document.getElementById('lblAdjustment');
        const resAllowance = document.getElementById('resAllowance');

        if (isKCode) {
            rawTaxableIncome = payToDate + proRatedAdjustment;
            if (lblAdjustment) lblAdjustment.textContent = isNonCumulative ? "Month 1 Additional Income:" : "Pro-rated Additional Income:";
            if (resAllowance) resAllowance.textContent = `+£${proRatedAdjustment.toFixed(2)}`;
        } else {
            rawTaxableIncome = payToDate - proRatedAdjustment;
            if (rawTaxableIncome < 0) rawTaxableIncome = 0;
            if (lblAdjustment) lblAdjustment.textContent = isNonCumulative ? "Month 1 Tax-free Allowance:" : "Pro-rated Tax-free Allowance:";
            if (resAllowance) resAllowance.textContent = `-£${proRatedAdjustment.toFixed(2)}`;
        }

        const hmrcRoundedTaxableIncome = Math.floor(rawTaxableIncome);
        const basicRateLimitYTD = (37700 / 12) * calculationMonth;
        let taxDue = 0;

        if (hmrcRoundedTaxableIncome <= basicRateLimitYTD) {
            taxDue = hmrcRoundedTaxableIncome * 0.20;
        } else {
            taxDue = basicRateLimitYTD * 0.20;
            const higherRateTaxable = hmrcRoundedTaxableIncome - basicRateLimitYTD;
            taxDue += (higherRateTaxable * 0.40); 
        }

        let finalTaxDue = Math.floor(taxDue);

        // Max 50% Regulatory Safeguard override Check
        const maxAllowedTax = payToDate * 0.50;
        let isCapped = false;
        if (finalTaxDue > maxAllowedTax) {
            finalTaxDue = Math.floor(maxAllowedTax);
            isCapped = true;
        }

        // Display results
        document.getElementById('resBasis').textContent = isNonCumulative ? "Non-Cumulative (W1/M1)" : "Cumulative";
        document.getElementById('resBasis').style.backgroundColor = isNonCumulative ? "#fee2e2" : "#e0f2fe";
        document.getElementById('resBasis').style.color = isNonCumulative ? "#991b1b" : "#0369a1";

        document.getElementById('resMonth').textContent = isNonCumulative ? `Month ${trueTaxMonth} (Processed as Month 1)` : `Month ${trueTaxMonth}`;
        document.getElementById('resTaxable').textContent = `£${hmrcRoundedTaxableIncome.toFixed(2)}`;
        document.getElementById('resTax').textContent = `£${finalTaxDue.toFixed(2)}`;
        document.getElementById('lblTaxTotal').textContent = isNonCumulative ? "Tax Due This Period:" : "Tax Due to Date:";
        document.getElementById('capAlert').style.display = isCapped ? 'block' : 'none';
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
